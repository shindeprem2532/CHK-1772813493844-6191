<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GhostVault Pro | Elite Analytics</title>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {

            --bg: #050505;

            --sidebar: #0f0f0f;

            --surface: #1a1a1a;

            --primary: #3ea6ff;

            --accent: #bb86fc;

            --text: #ffffff;

            --text-dim: #909090;

            --error: #ff4e4e;

            --success: #00e676;

            --border: #2a2a2a;

            --glass: rgba(255, 255, 255, 0.03);

        }

        * {
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {

            font-family: 'Inter', sans-serif;

            background-color: var(--bg);

            color: var(--text);

            margin: 0;

            display: flex;

            height: 100vh;

            overflow: hidden;

        }

        @keyframes superFade {

            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
                filter: blur(10px);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
                filter: blur(0px);
            }

        }

        .welcome-anim {

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            font-size: 3rem;
            color: var(--primary);
            font-weight: 900;

            text-shadow: 0 0 20px rgba(62, 166, 255, 0.4);
            z-index: 9999;
            pointer-events: none;

            background: rgba(0, 0, 0, 0.9);
            width: 100%;
            height: 100%;

            display: flex;
            align-items: center;
            justify-content: center;

        }

        #authWrapper {

            position: fixed;
            inset: 0;
            background: var(--bg);

            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;

        }

        .auth-card {

            background: var(--sidebar);
            padding: 40px;
            border-radius: 24px;

            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);

        }

        .pass-group {
            position: relative;
            width: 100%;
        }

        .pass-toggle {

            position: absolute;
            right: 12px;
            top: 22px;
            cursor: pointer;
            color: var(--text-dim);

        }

        .sidebar {

            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);

            display: flex;
            flex-direction: column;

        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg);
        }

        .top-bar {

            height: 70px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 0 30px;
            border-bottom: 1px solid var(--border);

            position: sticky;
            top: 0;
            z-index: 100;

        }

        .nav-link {

            padding: 16px 25px;
            display: flex;
            align-items: center;
            gap: 15px;

            cursor: pointer;
            color: var(--text-dim);
            border-radius: 0 25px 25px 0;

            margin: 4px 0;
            font-weight: 500;

        }

        .nav-link.active {

            background: #272727;
            color: var(--text);
            border-left: 5px solid var(--primary);

        }

        .grid-container {

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));

            gap: 25px;
            padding: 30px;

        }

        .card {

            background: var(--surface);
            padding: 25px;
            border-radius: 20px;

            border: 1px solid var(--border);

        }

        .card:hover {
            border-color: var(--primary);
        }

        input,
        select {

            width: 100%;
            padding: 14px;
            margin: 10px 0;

            background: #000;
            border: 1px solid var(--border);
            color: white;

            border-radius: 10px;

        }

        .btn-primary {

            background: var(--primary);
            color: #000;
            font-weight: bold;

            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;

            cursor: pointer;
            position: relative;
            overflow: hidden;

        }

        .btn-primary:hover {

            background: #5db6ff;
            box-shadow: 0 0 20px rgba(62, 166, 255, 0.4);

            transform: translateY(-2px);

        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-danger {

            background: rgba(255, 78, 78, 0.1);
            color: var(--error);

            border: 1px solid var(--error);
            padding: 8px 12px;

            border-radius: 6px;
            cursor: pointer;

        }

        .btn-danger:hover {
            background: var(--error);
            color: #000;
        }
