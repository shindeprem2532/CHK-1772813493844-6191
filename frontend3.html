        function togglePass(id) {

            const input = document.getElementById(id);

            input.type = input.type === 'password' ? 'text' : 'password';

        }

        function generateCaptcha() {

            captchaCode = Math.random().toString(36).substring(2, 7).toUpperCase();

            document.getElementById('captchaText').innerText = captchaCode;

        }

        function processAuth() {

            const email = document.getElementById('authEmail').value.trim();

            const p1 = document.getElementById('authPass').value;

            const p2 = document.getElementById('authPassConfirm').value;

            const cap = document.getElementById('captchaInput').value.toUpperCase();

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert("Enter valid email.");

            if (p1 !== p2) return alert("Keys do not match.");

            if (p1.length < 8 || !/[!@#$%^&*(),.?":{}|<>]/.test(p1)) return alert("8+ Chars & 1 Special Character required.");

            if (cap !== captchaCode) { alert("Captcha Error"); generateCaptcha(); return; }

            let accounts = JSON.parse(localStorage.getItem('gv_pro_v3') || '{}');

            if (!accounts[email]) {

                accounts[email] = {

                    data: [],

                    cards: [],

                    autopay: [],

                    sites: [],

                    profile: { phone: '', pfp: '', currency: '$', subscription: 'FREE' },

                    pass: p1

                };

            } else if (accounts[email].pass !== p1) {

                return alert("Incorrect Vault Key.");

            }

            localStorage.setItem('gv_pro_v3', JSON.stringify(accounts));

            currentSession = email;

            showWelcome();

        }

        function showWelcome() {

            const over = document.getElementById('welcomeOverlay');

            over.classList.remove('hidden');

            over.innerHTML = `<div class="welcome-anim">ACCESS GRANTED</div>`;

            setTimeout(() => {

                over.classList.add('hidden');

                document.getElementById('authWrapper').classList.add('hidden');

                initUI();

            }, 1800);

        }

        function initUI() {

            const user = JSON.parse(localStorage.getItem('gv_pro_v3'))[currentSession];

            document.getElementById('userBadge').innerText = currentSession;

            selectedCurrency = user.profile.currency || "$";

            document.getElementById('setCurrency').value = selectedCurrency;

            document.getElementById('currencyDisplay').innerText = selectedCurrency;

            document.getElementById('setEmail').value = currentSession;

            document.getElementById('setPhone').value = user.profile.phone || '';

            if (user.profile.pfp) updateAvatarUI(user.profile.pfp);

            const sub = user.profile.subscription || 'FREE';

            const badge = document.getElementById('subBadge');

            badge.innerText = sub.toUpperCase();

            badge.style.display = 'inline-block';

            renderAll();

            renderExplore();

            updateChart();

            renderAutopay();

            renderSites();

        }

        function addCard() {

            const name = document.getElementById('cardHolder').value.trim();

            const num = document.getElementById('cardNumber').value.trim();

            const nature = document.getElementById('cardNature').value;

            const expiry = document.getElementById('cardExpiry').value.trim();

            const cvv = document.getElementById('cardCVV').value.trim();

            const type = document.getElementById('cardType').value;

            if (!name || num.length < 13 || !/^\d{2}\/\d{2}$/.test(expiry) || cvv.length !== 3) {

                return alert("Invalid card details.");

            }

            let accs = JSON.parse(localStorage.getItem('gv_pro_v3'));

            accs[currentSession].cards.push({ name, num: num.slice(-4), nature, expiry, cvv: '***', type });

            localStorage.setItem('gv_pro_v3', JSON.stringify(accs));

            alert("Card securely added to vault.");

            renderAll();

        }

        function removeCard(index) {

            if (!confirm("Remove this card permanently?")) return;

            let accs = JSON.parse(localStorage.getItem('gv_pro_v3'));

            accs[currentSession].cards.splice(index, 1);

            localStorage.setItem('gv_pro_v3', JSON.stringify(accs));

            renderAll();

        }

        function updateCurrency() {

            selectedCurrency = document.getElementById('setCurrency').value;

            document.getElementById('currencyDisplay').innerText = selectedCurrency;

            renderAll();

            renderAutopay();

            renderSites();

        }

        function previewImage(input) {

            if (input.files?.[0]) {

                const reader = new FileReader();

                reader.onload = e => updateAvatarUI(e.target.result);

                reader.readAsDataURL(input.files[0]);

            }

        }

        function updateAvatarUI(src) {

            document.getElementById('pfpPreview').src = src; document.getElementById('pfpPreview').classList.remove('hidden');

            document.getElementById('userAvatarHeader').src = src; document.getElementById('userAvatarHeader').classList.remove('hidden');

            document.getElementById('pfpIcon').classList.add('hidden');

        }

        function saveProfile() {

            let accs = JSON.parse(localStorage.getItem('gv_pro_v3'));

            accs[currentSession].profile.phone = document.getElementById('setPhone').value.trim();

            accs[currentSession].profile.pfp = document.getElementById('pfpPreview').src;

            accs[currentSession].profile.currency = selectedCurrency;

            localStorage.setItem('gv_pro_v3', JSON.stringify(accs));

            alert("Profile updated.");

        }

        function renderExplore() {

            document.getElementById('categoryGrid').innerHTML = Object.keys(categories).map(k => `

        <div class="card">

            <i data-lucide="${categories[k].icon}" style="color:${categories[k].color}"></i>

            <h3>${k}</h3>

            <p style="font-size:12px;color:var(--text-dim)">${categories[k].detail}</p>

            <button onclick="openSubCategory('${k}')" class="btn-primary" style="padding:8px 0">OPEN LEDGER</button>

        </div>

    `).join('');

            lucide.createIcons();

        }

        function openSubCategory(cat) {

            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));

            document.getElementById('category-page').classList.remove('hidden');

            document.getElementById('viewTitle').innerText = cat.toUpperCase();

            const c = categories[cat];

            document.getElementById('catPageContent').innerHTML = `

        <div class="card" style="max-width:520px;margin:0 auto;">

            <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">

                <i data-lucide="${c.icon}" style="color:${c.color}"></i>

                <h2 style="margin:0;">${cat} Ledger</h2>

            </div>

            <label style="font-size:12px;color:var(--text-dim)">Description</label>

            <input type="text" id="subExpName" placeholder="e.g. Dinner, Taxi, Netflix">

            <label style="font-size:12px;color:var(--text-dim)">Amount (${selectedCurrency})</label>

            <input type="number" id="subExpAmt" step="0.01" placeholder="0.00">

            <button class="btn-primary" onclick="logSubExpense('${cat}')">SAVE ENTRY</button>

            <button class="btn-danger" style="margin-top:12px;width:100%;background:none;border:none;" onclick="switchTab('explore')">Cancel</button>

        </div>

    `;

            lucide.createIcons();

        }

        function logSubExpense(cat) {

            const name = document.getElementById('subExpName').value.trim();

            const amt = parseFloat(document.getElementById('subExpAmt').value);

            if (!name || isNaN(amt) || amt <= 0) return alert("Please enter valid description and amount.");

            let accs = JSON.parse(localStorage.getItem('gv_pro_v3'));

            accs[currentSession].data.push({ name, amt, cat, date: new Date().toISOString() });

            localStorage.setItem('gv_pro_v3', JSON.stringify(accs));

            alert("Expense logged.");

            renderAll();

            updateChart();

            switchTab('home');

        }

        </div>

    `;

            lucide.createIcons();

        }

        // ────────────────────────────────────────────────

        // AUTOPAY FUNCTIONS

        // ────────────────────────────────────────────────

        function addAutopay() {

            const name = document.getElementById('autopayName').value.trim();

            const amount = parseFloat(document.getElementById('autopayAmount').value);

            const currency = document.getElementById('autopayCurrency').value;

            const start = document.getElementById('autopayStartDate').value;

            const status = document.getElementById('autopayStatus').value;

            if (!name || isNaN(amount) || amount <= 0 || !start) {

                return alert("Please complete all fields with valid values.");

            }

            let accs = JSON.parse(localStorage.getItem('gv_pro_v3'));

            accs[currentSession].autopay = accs[currentSession].autopay || [];

            accs[currentSession].autopay.push({

                name, amount, currency, startDate: start,

                status, added: new Date().toISOString()

            });

            localStorage.setItem('gv_pro_v3', JSON.stringify(accs));

            // reset form

            document.getElementById('autopayName').value = '';

            document.getElementById('autopayAmount').value = '';

            document.getElementById('autopayStartDate').value = '';

            renderAutopay();

            alert("Autopay entry added.");

        }
